# One-off diagnostic — manual trigger only.
# File location:  .github/workflows/probe2.yml

name: Probe 2 - feed alternatives

on:
  workflow_dispatch:

jobs:
  probe2:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt curl_cffi
      - run: python probe2.py
